name: Build & Smuggle Saroth WeChat (BYOA 自动索敌版)
on: 
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 拉取你的私有仓库文件
        uses: actions/checkout@v4
        
      - name: 2. 克隆作者图纸 & 全自动巡航索敌
        run: |
          echo "下载 Saroth 图纸..."
          git clone https://github.com/Saroth/docker_wechat.git workspace
          
          echo "======================================"
          echo "启动雷达，在你的仓库里搜索弹药..."
          mkdir -p workspace/package
          
          # 自动寻找任何一层目录下的 zip 和 exe
          ZIP_FILE=$(find . -path ./workspace -prune -o -name "*.zip" -print | head -n 1)
          EXE_FILE=$(find . -path ./workspace -prune -o -name "*.exe" -print | head -n 1)
          
          if [ -n "$ZIP_FILE" ]; then
            echo "🎯 找到注入包: $ZIP_FILE"
            # 不管你之前改没改名，这里强制给你改成标准名字！
            mv "$ZIP_FILE" workspace/package/v_latest.zip
          else
            echo "❌ 致命错误：整个仓库都没找到 .zip 文件！你确定点 Upload 上传并 Commit 了吗？"
            exit 1
          fi
          
          if [ -n "$EXE_FILE" ]; then
            echo "🎯 找到微信安装包: $EXE_FILE"
            mv "$EXE_FILE" workspace/package/
          else
            echo "❌ 致命错误：整个仓库都没找到 .exe 文件！"
            exit 1
          fi
          
          echo "======================================"
          echo "弹药装填完毕！验明正身："
          ls -lh workspace/package/
          
      - name: 3. 在云端启动黑灯工厂
        run: |
          cd workspace
          chmod +x ./docker/docker_build.sh
          sudo ./docker/docker_build.sh
          
      - name: 4. 打包重塑的肉身
        run: |
          IMAGE_NAME=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "wechat|wcf" | head -n 1)
          echo "正在打包镜像: $IMAGE_NAME"
          docker save -o wechat-vnc.tar $IMAGE_NAME
          
      - name: 5. 发货到仓库 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v3.0.${{ github.run_number }}
          files: wechat-vnc.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
