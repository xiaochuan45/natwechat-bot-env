name: Build & Smuggle Saroth WeChat
on: 
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 克隆作者的构建图纸
        uses: actions/checkout@v4
        with:
          repository: Saroth/docker_wechat
          
      - name: 2. 精准下载学姐的 v39.5.1 稳定版组件
        run: |
          mkdir -p package
          echo "开始请求 GitHub API，精准定位 v39.5.1 的真实下载链接..."
          
          # 利用 API 直接抓取 v39.5.1 标签下的所有文件链接，彻底告别盲猜 404
          URLS=$(curl -s https://api.github.com/repos/lich0821/WeChatFerry/releases/tags/v39.5.1 | grep "browser_download_url" | cut -d '"' -f 4)
          
          # 循环下载匹配到的 zip 和 exe 文件
          for url in $URLS; do
            echo "锁定目标，正在下载: $url"
            wget -q --show-progress -P package/ "$url"
          done
          
          echo "组件拉取完毕！云端验货："
          ls -lh package/
          
      - name: 3. 在云端启动工厂构建
        run: |
          chmod +x ./docker/docker_build.sh
          sudo ./docker/docker_build.sh
          
      - name: 4. 打包重塑的肉身
        run: |
          IMAGE_NAME=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "wechat|wcf" | head -n 1)
          docker save -o wechat-vnc.tar $IMAGE_NAME
          
      - name: 5. 发货到仓库 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.0.${{ github.run_number }}
          files: wechat-vnc.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
