name: Build & Smuggle Saroth WeChat
on: 
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 克隆作者的构建图纸
        uses: actions/checkout@v4
        with:
          repository: Saroth/docker_wechat
          
      - name: 2. 官方 API 提取纯净直链 (带验真逻辑)
        run: |
          mkdir -p package
          echo "请求 GitHub 官方 API 获取全部发布数据..."
          
          # 获取包含所有版本的 API 响应（无视是否为 latest 标签）
          JSON=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/lich0821/WeChatFerry/releases)
          
          # 精准提取第一个真实的 zip 和 exe 直链
          ZIP_URL=$(echo "$JSON" | grep -oE '"browser_download_url": "[^"]+\.zip"' | head -n 1 | cut -d'"' -f4)
          EXE_URL=$(echo "$JSON" | grep -oE '"browser_download_url": "[^"]+\.exe"' | head -n 1 | cut -d'"' -f4)
          
          echo "获取到的真实 ZIP 链接: $ZIP_URL"
          echo "获取到的真实 EXE 链接: $EXE_URL"
          
          if [ -z "$ZIP_URL" ] || [ -z "$EXE_URL" ]; then
            echo "❌ 提取失败，请检查 API 响应！"
            exit 1
          fi
          
          # 正式下载，ZIP 直接强制命名为 v_latest.zip
          wget -q --show-progress -O package/v_latest.zip "$ZIP_URL"
          wget -q --show-progress -P package/ "$EXE_URL"
          
          # 🚨 终极防线：验证文件类型！防止下到假网页
          echo "===== 验明正身（如果是 Zip archive 说明稳了） ====="
          file package/v_latest.zip
          ls -lh package/
          
      - name: 3. 在云端启动工厂构建
        run: |
          chmod +x ./docker/docker_build.sh
          sudo ./docker/docker_build.sh
          
      - name: 4. 打包重塑的肉身
        run: |
          IMAGE_NAME=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "wechat|wcf" | head -n 1)
          echo "正在打包镜像: $IMAGE_NAME"
          docker save -o wechat-vnc.tar $IMAGE_NAME
          
      - name: 5. 发货到仓库 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.0.${{ github.run_number }}
          files: wechat-vnc.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
