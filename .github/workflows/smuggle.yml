name: Build & Smuggle Saroth WeChat
on: 
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 克隆作者的构建图纸
        uses: actions/checkout@v4
        with:
          repository: Saroth/docker_wechat
          
      - name: 2. 动用官方利器强拉最新组件 (百分百成功)
        env:
          # 注入官方护身符，彻底破解下载限流
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p package
          echo "抛弃旧方案，使用 Github 官方 CLI 强拉最新版..."
          
          # 直接自动拉取最新版本的 zip 和 exe，告别 404 和盲猜版本号
          gh release download -R lich0821/WeChatFerry --latest -p "*.zip" -D package/
          gh release download -R lich0821/WeChatFerry --latest -p "*.exe" -D package/
          
          cd package/
          # 找到拉下来的 zip 文件，强行套上 v 开头的马甲满足 Docker 要求
          ZIP_NAME=$(ls *.zip | head -n 1)
          if [[ -n "$ZIP_NAME" && "$ZIP_NAME" != v* ]]; then
            echo "发现官方包 $ZIP_NAME，正在重命名为 v_latest.zip"
            mv "$ZIP_NAME" v_latest.zip
          fi
          cd ..
          
          echo "【大清点】如果下面出现了 zip 和 exe 文件，第 3 步绝不可能再报错："
          ls -lh package/
          
      - name: 3. 在云端启动工厂构建
        run: |
          chmod +x ./docker/docker_build.sh
          sudo ./docker/docker_build.sh
          
      - name: 4. 打包重塑的肉身
        run: |
          IMAGE_NAME=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "wechat|wcf" | head -n 1)
          echo "正在打包镜像: $IMAGE_NAME"
          docker save -o wechat-vnc.tar $IMAGE_NAME
          
      - name: 5. 发货到仓库 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.0.${{ github.run_number }}
          files: wechat-vnc.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
