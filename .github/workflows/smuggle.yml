name: Build & Smuggle Saroth WeChat
on: 
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 克隆作者的构建图纸
        uses: actions/checkout@v4
        with:
          repository: Saroth/docker_wechat
          
      - name: 2. 精准下载并伪装学姐的 v39.5.1 组件
        run: |
          mkdir -p package
          echo "开始请求 GitHub API，精准定位 v39.5.1 的真实下载链接..."
          
          # 利用 API 抓取链接，彻底告别 404
          URLS=$(curl -s https://api.github.com/repos/lich0821/WeChatFerry/releases/tags/v39.5.1 | grep "browser_download_url" | cut -d '"' -f 4)
          
          for url in $URLS; do
            echo "锁定目标，正在下载: $url"
            wget -q --show-progress -P package/ "$url"
          done
          
          # 🚨 终极修复：把官方的长名字重命名为构建脚本期望的短名字
          cd package/
          mv WeChatFerry-*.zip v39.5.1.zip || echo "重命名失败，可能文件已是正确格式"
          cd ..
          
          echo "组件准备完毕！云端验货："
          ls -lh package/
          
      - name: 3. 在云端启动工厂构建
        run: |
          chmod +x ./docker/docker_build.sh
          sudo ./docker/docker_build.sh
          
      - name: 4. 打包重塑的肉身
        run: |
          # 提取新构建的镜像名称并打包
          IMAGE_NAME=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "wechat|wcf" | head -n 1)
          echo "正在打包镜像: $IMAGE_NAME"
          docker save -o wechat-vnc.tar $IMAGE_NAME
          
      - name: 5. 发货到仓库 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.0.${{ github.run_number }}
          files: wechat-vnc.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
