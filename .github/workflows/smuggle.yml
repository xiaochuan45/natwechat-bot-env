name: Build & Smuggle Saroth WeChat
on: 
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 克隆作者的构建图纸
        uses: actions/checkout@v4
        with:
          repository: Saroth/docker_wechat
          
      - name: 2. 终极 Python 核弹级智能下载器 (绝对稳)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p package
          # 将霸道的 Python 爬虫写入文件
          cat << 'EOF' > download.py
          import urllib.request, json, os
          req = urllib.request.Request('https://api.github.com/repos/lich0821/WeChatFerry/releases')
          req.add_header('Authorization', 'token ' + os.environ.get('GH_TOKEN', ''))
          try:
              with urllib.request.urlopen(req) as resp:
                  releases = json.loads(resp.read().decode())
              # 从最新的版本开始往下扫
              for r in releases:
                  assets = r.get('assets', [])
                  has_zip = any(a['name'].endswith('.zip') for a in assets)
                  has_exe = any(a['name'].endswith('.exe') for a in assets)
                  # 只要发现同时存在 zip 和 exe 的版本，立刻锁定！
                  if has_zip and has_exe:
                      print('========== 锁定完美可用版本: ' + r['tag_name'] + ' ==========')
                      for a in assets:
                          name = a['name']
                          if name.endswith('.zip') or name.endswith('.exe'):
                              print('正在光速下载: ' + name)
                              # 自动重命名 zip，满足 Docker 编译需求
                              out_name = 'package/v_latest.zip' if name.endswith('.zip') else 'package/' + name
                              urllib.request.urlretrieve(a['browser_download_url'], out_name)
                      break
          except Exception as e:
              print("Python Error:", str(e))
          EOF
          
          # 执行爬虫
          python3 download.py
          
          echo "【终极验货】只要下面有文件，第3步绝不报错！"
          ls -lh package/
          
      - name: 3. 在云端启动工厂构建
        run: |
          chmod +x ./docker/docker_build.sh
          sudo ./docker/docker_build.sh
          
      - name: 4. 打包重塑的肉身
        run: |
          IMAGE_NAME=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "wechat|wcf" | head -n 1)
          echo "正在打包镜像: $IMAGE_NAME"
          docker save -o wechat-vnc.tar $IMAGE_NAME
          
      - name: 5. 发货到仓库 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.0.${{ github.run_number }}
          files: wechat-vnc.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
