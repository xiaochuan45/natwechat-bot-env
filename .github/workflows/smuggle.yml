name: Build & Smuggle Saroth WeChat (BYOA 自带干粮版)
on: 
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 拉取你自己的私有军火库
        uses: actions/checkout@v4
        # 这一步会把你刚上传的 package 文件夹拉到云端
        
      - name: 2. 克隆作者图纸并注入灵魂
        run: |
          echo "下载 Saroth 图纸..."
          git clone https://github.com/Saroth/docker_wechat.git workspace
          
          echo "把咱们自带的弹药库塞进图纸里..."
          # 强制把你仓库里的 package 文件夹移到构建目录里
          mv package/ workspace/
          
          echo "验明正身！"
          ls -lh workspace/package/
          
      - name: 3. 在云端启动黑灯工厂
        run: |
          cd workspace
          chmod +x ./docker/docker_build.sh
          sudo ./docker/docker_build.sh
          
      - name: 4. 打包重塑的肉身
        run: |
          # 提取打包出来的镜像名字
          IMAGE_NAME=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "wechat|wcf" | head -n 1)
          echo "正在打包镜像: $IMAGE_NAME"
          docker save -o wechat-vnc.tar $IMAGE_NAME
          
      - name: 5. 发货到仓库 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v3.0.${{ github.run_number }}
          files: wechat-vnc.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
