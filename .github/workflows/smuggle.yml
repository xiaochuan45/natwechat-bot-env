name: Build & Smuggle Saroth WeChat
on: 
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 克隆构建图纸
        uses: actions/checkout@v4
        with:
          repository: Saroth/docker_wechat
          
      - name: 2. 启动末日拾荒 (全网搜寻遗失的安装包)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p package
          echo "主基地没货，启动拾荒雷达，扫描最近的 Fork 节点..."
          
          # 抓取最近的 100 个分支仓库名单
          FORKS=$(curl -sL -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/lich0821/WeChatFerry/forks?sort=newest&per_page=100" | grep '"full_name":' | cut -d'"' -f4)
          
          for fork in $FORKS; do
            echo "正在探测节点: $fork ..."
            JSON=$(curl -sL -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$fork/releases")
            
            # 寻找成品的 zip 和 exe
            ZIP_URL=$(echo "$JSON" | grep -oE '"browser_download_url": "[^"]+\.zip"' | head -n 1 | cut -d'"' -f4)
            EXE_URL=$(echo "$JSON" | grep -oE '"browser_download_url": "[^"]+\.exe"' | head -n 1 | cut -d'"' -f4)
            
            if [ -n "$ZIP_URL" ] && [ -n "$EXE_URL" ]; then
              echo "🎯 发现宝藏！在 $fork 节点找到了幸存物资！"
              echo "ZIP: $ZIP_URL"
              echo "EXE: $EXE_URL"
              break
            fi
          done
          
          if [ -z "$ZIP_URL" ] || [ -z "$EXE_URL" ]; then
            echo "❌ 完犊子，前 100 个节点全被清空了！"
            exit 1
          fi
          
          echo "正在火速抢收..."
          wget -q --show-progress -O package/v_latest.zip "$ZIP_URL"
          wget -q --show-progress -P package/ "$EXE_URL"
          
          echo "===== 验明正身 ====="
          file package/v_latest.zip
          ls -lh package/
          
      - name: 3. 在云端启动工厂构建
        run: |
          chmod +x ./docker/docker_build.sh
          sudo ./docker/docker_build.sh
          
      - name: 4. 打包重塑的肉身
        run: |
          IMAGE_NAME=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "wechat|wcf" | head -n 1)
          docker save -o wechat-vnc.tar $IMAGE_NAME
          
      - name: 5. 发货到仓库 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.0.${{ github.run_number }}
          files: wechat-vnc.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
