name: Build & Smuggle Saroth WeChat
on: 
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 克隆作者的构建图纸
        uses: actions/checkout@v4
        with:
          repository: Saroth/docker_wechat
          
      - name: 2. 网页爬虫暴力抓取 (无视所有API限制)
        run: |
          mkdir -p package
          echo "抛弃官方API，直接用正则爬虫刮取网页！"
          
          # 直接抓取 Releases 页面的原始 HTML 代码
          HTML=$(curl -sL https://github.com/lich0821/WeChatFerry/releases)
          
          # 暴力正则抠出第一个(最新版) zip 和 exe 的真实下载路径
          ZIP_PATH=$(echo "$HTML" | grep -oE '/lich0821/WeChatFerry/releases/download/[^"]+\.zip' | head -n 1)
          EXE_PATH=$(echo "$HTML" | grep -oE '/lich0821/WeChatFerry/releases/download/[^"]+\.exe' | head -n 1)
          
          echo "锁定 ZIP: https://github.com$ZIP_PATH"
          echo "锁定 EXE: https://github.com$EXE_PATH"
          
          # 直接下载！并在下载时强制把 zip 命名为 Docker 期望的 v_latest.zip
          wget -q --show-progress -O package/v_latest.zip "https://github.com$ZIP_PATH"
          wget -q --show-progress -P package/ "https://github.com$EXE_PATH"
          
          # 🚨 终极防线：撕掉所有的 .dockerignore，防止 Docker 抽风屏蔽 package 文件夹
          rm -f .dockerignore docker/.dockerignore
          
          echo "【大清点】看到这里的压缩包，这把就稳赢了："
          ls -lh package/
          
      - name: 3. 在云端启动工厂构建
        run: |
          chmod +x ./docker/docker_build.sh
          sudo ./docker/docker_build.sh
          
      - name: 4. 打包重塑的肉身
        run: |
          IMAGE_NAME=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "wechat|wcf" | head -n 1)
          echo "正在打包镜像: $IMAGE_NAME"
          docker save -o wechat-vnc.tar $IMAGE_NAME
          
      - name: 5. 发货到仓库 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.0.${{ github.run_number }}
          files: wechat-vnc.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
